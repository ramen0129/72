<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Failbell Workshop App</title>
  <!-- Modern crisp font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body
  class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center antialiased selection:bg-indigo-100 pb-24">

  <header class="mb-8 md:mb-12 text-center pointer-events-none select-none mt-12 md:mt-0">
    <h1 class="text-4xl md:text-5xl font-light tracking-tight text-slate-900 mb-2">Failbell</h1>
    <p class="text-slate-500 font-light tracking-wide">Workshop Audio Companion</p>
  </header>

  <main
    class="w-full max-w-4xl px-6 grid grid-cols-2 lg:grid-cols-5 md:grid-cols-3 gap-4 md:gap-6 justify-center items-center pb-12">

    <!-- Button 1 -->
    <button id="btn-bell-0"
      class="bell-btn group relative w-full aspect-square bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 hover:border-indigo-200 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-indigo-100"
      aria-label="Play Bell 1" data-sound="bell-ringing-01c.mp3">
      <div
        class="icon-bg w-12 h-12 md:w-16 md:h-16 rounded-full bg-indigo-50 flex items-center justify-center mb-3 group-hover:bg-indigo-100 transition-colors duration-300">
        <svg class="w-6 h-6 md:w-8 md:h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-xs md:text-sm font-medium tracking-wide text-slate-700 pointer-events-none">Bell 1</span>
      <!-- Active Ring Indicator -->
      <div
        class="active-ring absolute inset-0 rounded-3xl border-2 border-indigo-400 opacity-0 pointer-events-none transition-opacity duration-300">
      </div>
    </button>

    <!-- Button 2 -->
    <button id="btn-bell-1"
      class="bell-btn group relative w-full aspect-square bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 hover:border-emerald-200 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-emerald-100"
      aria-label="Play Bell 2" data-sound="bell-ringing-02.mp3">
      <div
        class="icon-bg w-12 h-12 md:w-16 md:h-16 rounded-full bg-emerald-50 flex items-center justify-center mb-3 group-hover:bg-emerald-100 transition-colors duration-300">
        <svg class="w-6 h-6 md:w-8 md:h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-xs md:text-sm font-medium tracking-wide text-slate-700 pointer-events-none">Bell 2</span>
      <div
        class="active-ring absolute inset-0 rounded-3xl border-2 border-emerald-400 opacity-0 pointer-events-none transition-opacity duration-300">
      </div>
    </button>

    <!-- Button 3 -->
    <button id="btn-bell-2"
      class="bell-btn group relative w-full aspect-square bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 hover:border-amber-200 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-amber-100"
      aria-label="Play Bell 3" data-sound="bell-ringing-03a.mp3">
      <div
        class="icon-bg w-12 h-12 md:w-16 md:h-16 rounded-full bg-amber-50 flex items-center justify-center mb-3 group-hover:bg-amber-100 transition-colors duration-300">
        <svg class="w-6 h-6 md:w-8 md:h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-xs md:text-sm font-medium tracking-wide text-slate-700 pointer-events-none">Bell 3</span>
      <div
        class="active-ring absolute inset-0 rounded-3xl border-2 border-amber-400 opacity-0 pointer-events-none transition-opacity duration-300">
      </div>
    </button>

    <!-- Button 4 -->
    <button id="btn-bell-3"
      class="bell-btn group relative w-full aspect-square bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 hover:border-rose-200 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-rose-100"
      aria-label="Play Bell 4" data-sound="bell-ringing-04.mp3">
      <div
        class="icon-bg w-12 h-12 md:w-16 md:h-16 rounded-full bg-rose-50 flex items-center justify-center mb-3 group-hover:bg-rose-100 transition-colors duration-300">
        <svg class="w-6 h-6 md:w-8 md:h-8 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-xs md:text-sm font-medium tracking-wide text-slate-700 pointer-events-none">Bell 4</span>
      <div
        class="active-ring absolute inset-0 rounded-3xl border-2 border-rose-400 opacity-0 pointer-events-none transition-opacity duration-300">
      </div>
    </button>

    <!-- Button 5 -->
    <button id="btn-bell-4"
      class="bell-btn col-span-2 md:col-span-1 lg:col-span-1 w-1/2 justify-self-center md:w-full aspect-[2/1] md:aspect-square group relative bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 hover:border-sky-200 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-sky-100"
      aria-label="Play Bell 5" data-sound="bell-ringing-05.mp3">
      <div
        class="icon-bg w-12 h-12 md:w-16 md:h-16 rounded-full bg-sky-50 flex items-center justify-center mb-3 group-hover:bg-sky-100 transition-colors duration-300">
        <svg class="w-6 h-6 md:w-8 md:h-8 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-xs md:text-sm font-medium tracking-wide text-slate-700 pointer-events-none">Bell 5</span>
      <div
        class="active-ring absolute inset-0 rounded-3xl border-2 border-sky-400 opacity-0 pointer-events-none transition-opacity duration-300">
      </div>
    </button>

  </main>

  <!-- Floating Audio Control Bar -->
  <div
    class="fixed bottom-6 left-1/2 -translate-x-1/2 w-11/12 max-w-[24rem] bg-white/70 backdrop-blur-xl shadow-2xl border border-white/80 rounded-full px-5 py-3 flex items-center justify-between gap-3 z-50">

    <!-- Play/Pause Toggle -->
    <button id="btn-play-pause"
      class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-full bg-slate-900 text-white hover:bg-slate-700 hover:scale-105 active:scale-95 transition-all shadow-md focus:outline-none focus:ring-4 focus:ring-slate-200"
      aria-label="Play or Pause">
      <!-- Play Icon -->
      <svg id="icon-play" class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z" />
      </svg>
      <!-- Pause Icon -->
      <svg id="icon-pause" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
      </svg>
    </button>

    <!-- Stop Button -->
    <button id="btn-stop"
      class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full bg-white text-slate-500 hover:bg-slate-50 hover:text-rose-500 hover:scale-105 active:scale-95 transition-all shadow-sm border border-slate-200 focus:outline-none focus:ring-4 focus:ring-rose-50"
      aria-label="Stop">
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
        <path d="M6 6h12v12H6z" />
      </svg>
    </button>

    <!-- Volume Control -->
    <div class="flex items-center gap-2 flex-grow mx-2">
      <svg class="w-4 h-4 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
      </svg>
      <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1"
        class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-300 focus:ring-offset-2">
    </div>
  </div>

  <footer class="mt-auto mb-6 text-xs text-slate-400 font-light pointer-events-none select-none">
    &copy; 2026 Space Brothers Mission Control
  </footer>

  <script type="module" src="/src/main.js"></script>
  <link rel="stylesheet" href="/src/style.css" />
</body>

</html>
