<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Failbell Workshop App</title>
  <!-- Modern crisp font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body
  class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center antialiased selection:bg-indigo-100">

  <header class="mb-12 text-center pointer-events-none select-none">
    <h1 class="text-4xl md:text-5xl font-light tracking-tight text-slate-900 mb-2">Failbell</h1>
    <p class="text-slate-500 font-light tracking-wide">Workshop Audio Companion</p>
  </header>

  <main class="w-full max-w-4xl px-6 flex flex-wrap justify-center items-center gap-6">

    <!-- Button 1 -->
    <button id="btn-bell-1"
      class="group relative w-full sm:w-40 h-40 bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 hover:border-indigo-100 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-indigo-100"
      aria-label="Play Bell 1" data-sound="bell-ringing-01c.mp3">
      <div
        class="w-14 h-14 rounded-full bg-indigo-50 flex items-center justify-center mb-4 group-hover:bg-indigo-100 transition-colors duration-300">
        <svg class="w-7 h-7 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-sm font-medium tracking-wide text-slate-700">Bell 1</span>
    </button>

    <!-- Button 2 -->
    <button id="btn-bell-2"
      class="group relative w-full sm:w-40 h-40 bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 hover:border-emerald-100 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-emerald-100"
      aria-label="Play Bell 2" data-sound="bell-ringing-02.mp3">
      <div
        class="w-14 h-14 rounded-full bg-emerald-50 flex items-center justify-center mb-4 group-hover:bg-emerald-100 transition-colors duration-300">
        <svg class="w-7 h-7 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-sm font-medium tracking-wide text-slate-700">Bell 2</span>
    </button>

    <!-- Button 3 -->
    <button id="btn-bell-3"
      class="group relative w-full sm:w-40 h-40 bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 hover:border-amber-100 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-amber-100"
      aria-label="Play Bell 3" data-sound="bell-ringing-03a.mp3">
      <div
        class="w-14 h-14 rounded-full bg-amber-50 flex items-center justify-center mb-4 group-hover:bg-amber-100 transition-colors duration-300">
        <svg class="w-7 h-7 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-sm font-medium tracking-wide text-slate-700">Bell 3</span>
    </button>

    <!-- Button 4 -->
    <button id="btn-bell-4"
      class="group relative w-full sm:w-40 h-40 bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 hover:border-rose-100 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-rose-100"
      aria-label="Play Bell 4" data-sound="bell-ringing-04.mp3">
      <div
        class="w-14 h-14 rounded-full bg-rose-50 flex items-center justify-center mb-4 group-hover:bg-rose-100 transition-colors duration-300">
        <svg class="w-7 h-7 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-sm font-medium tracking-wide text-slate-700">Bell 4</span>
    </button>

    <!-- Button 5 -->
    <button id="btn-bell-5"
      class="group relative w-full sm:w-40 h-40 bg-white rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 hover:border-sky-100 transition-all duration-300 ease-out flex flex-col items-center justify-center focus:outline-none focus:ring-4 focus:ring-sky-100"
      aria-label="Play Bell 5" data-sound="bell-ringing-05.mp3">
      <div
        class="w-14 h-14 rounded-full bg-sky-50 flex items-center justify-center mb-4 group-hover:bg-sky-100 transition-colors duration-300">
        <svg class="w-7 h-7 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
      </div>
      <span class="text-sm font-medium tracking-wide text-slate-700">Bell 5</span>
    </button>

  </main>

  <footer class="mt-20 text-xs text-slate-400 font-light pointer-events-none select-none">
    &copy; 2026 Space Brothers Mission Control
  </footer>

  <script type="module" src="/src/main.js"></script>
  <link rel="stylesheet" href="/src/style.css" />
</body>

</html>
